<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Auto-Category Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #2ecc71, #27ae60);
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: #fff;
  padding: 30px;
  width: 420px;
  border-radius: 12px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

h2 { text-align: center; }

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 6px;
  background: #27ae60;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
}

.spinner {
  display: none;
  margin: 15px auto;
  border: 4px solid #f3f3f3;
  border-top: 4px solid #27ae60;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.progress-bar {
  width: 100%;
  background: #eee;
  border-radius: 6px;
  margin-top: 10px;
  overflow: hidden;
  display: none;
}

.progress {
  height: 10px;
  width: 0%;
  background: #27ae60;
  transition: width 0.3s;
}

.result {
  margin-top: 20px;
  background: #ecf9f1;
  padding: 15px;
  border-radius: 6px;
  display: none;
}

.confidence-bar {
  background: #ddd;
  border-radius: 6px;
  margin-top: 8px;
  overflow: hidden;
}

.confidence-fill {
  height: 8px;
  width: 0%;
  background: #2ecc71;
  transition: width 1s ease-in-out;
}

.ai-text {
  font-style: italic;
  margin-top: 10px;
  color: #555;
}
</style>
</head>
<body>

<div class="container">
  <h2>🌿 AI Product Analyzer</h2>

  <form id="productForm">
    <input type="text" id="product_name" placeholder="Enter product name" required>
    <textarea id="description" rows="4" placeholder="Enter description" required></textarea>
    <button type="submit">Analyze Product</button>
  </form>

  <div class="spinner" id="spinner"></div>

  <div class="progress-bar" id="progressBar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="ai-text" id="aiThinking"></div>

  <div class="result" id="resultBox">
    <p><strong>Category:</strong> <span id="category"></span></p>
    <p><strong>Tags:</strong> <span id="tags"></span></p>

    <p><strong>Confidence Score:</strong> <span id="confidenceText"></span></p>
    <div class="confidence-bar">
      <div class="confidence-fill" id="confidenceFill"></div>
    </div>
  </div>
</div>

<script>
const form = document.getElementById("productForm");
const spinner = document.getElementById("spinner");
const progressBar = document.getElementById("progressBar");
const progress = document.getElementById("progress");
const aiThinking = document.getElementById("aiThinking");
const resultBox = document.getElementById("resultBox");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const product_name = document.getElementById("product_name").value;
  const description = document.getElementById("description").value;

  // Reset UI
  resultBox.style.display = "none";
  spinner.style.display = "block";
  progressBar.style.display = "block";
  progress.style.width = "0%";
  aiThinking.textContent = "";
  form.querySelector("button").disabled = true;

  // Fake progress animation
  let width = 0;
  const progressInterval = setInterval(()=>{
    if(width >= 90) return;
    width += 10;
    progress.style.width = width + "%";
  }, 300);

  // Fake AI typing
  const messages = [
    "Analyzing product description...",
    "Classifying category...",
    "Generating SEO tags...",
    "Calculating confidence score..."
  ];

  let msgIndex = 0;
  const typingInterval = setInterval(()=>{
    if(msgIndex < messages.length){
      aiThinking.textContent = messages[msgIndex];
      msgIndex++;
    }
  }, 700);

  // Artificial delay
  await new Promise(resolve => setTimeout(resolve, 3000));

  try {
    const response = await fetch("/api/analyze", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ product_name, description })
    });

    const data = await response.json();

    clearInterval(progressInterval);
    clearInterval(typingInterval);

    progress.style.width = "100%";
    spinner.style.display = "none";
    aiThinking.textContent = "AI analysis complete ✅";

    document.getElementById("category").textContent = data.category;
    document.getElementById("tags").textContent = data.tags.join(", ");

    // Confidence animation
    const confidence = Math.floor(Math.random() * 15) + 85; // 85-99%
    document.getElementById("confidenceText").textContent = confidence + "%";
    document.getElementById("confidenceFill").style.width = confidence + "%";

    resultBox.style.display = "block";

  } catch(error){
    aiThinking.textContent = "❌ Error analyzing product";
  } finally {
    form.querySelector("button").disabled = false;
  }
});
</script>

</body>
</html>
